<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>Komesjes</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <p class="app__eyebrow">Slim boodschappenlijstje</p>
        <h1>Komesjes</h1>
        <p>Alles wat op is, meteen delen met je gezin.</p>
        <p id="sync-status" class="sync-status" aria-live="polite"></p>
      </header>

      <section id="auth-panel" class="panel">
        <h2>Gezin openen</h2>
        <p class="auth-help">
          Kies of je wil inloggen of een nieuw gezin wil aanmaken. Dit toestel onthoudt daarna veilig je sessie.
        </p>
        <form
          id="family-form"
          class="add-item-form"
          autocomplete="off"
          method="post"
          action="javascript:void(0)"
          onsubmit="return false"
        >
          <div class="auth-mode" role="radiogroup" aria-label="Toegangstype">
            <label class="auth-mode__option">
              <input type="radio" name="authMode" value="login" checked />
              <span>Inloggen</span>
            </label>
            <label class="auth-mode__option">
              <input type="radio" name="authMode" value="register" />
              <span>Nieuw gezin</span>
            </label>
          </div>
          <div class="field">
            <label for="family-name">Gezinsnaam</label>
            <input
              id="family-name"
              name="familyName"
              type="text"
              placeholder="Bijv. Familie Peeters"
              required
              maxlength="80"
            />
          </div>
          <div class="field">
            <label for="family-pin">Pincode (4-8 cijfers)</label>
            <input
              id="family-pin"
              name="pin"
              type="password"
              inputmode="numeric"
              pattern="[0-9]{4,8}"
              placeholder="Bijv. 1234"
              required
              maxlength="8"
            />
          </div>
          <div id="confirm-pin-field" class="field" hidden>
            <label for="family-pin-confirm">Herhaal pincode</label>
            <input
              id="family-pin-confirm"
              name="pinConfirm"
              type="password"
              inputmode="numeric"
              pattern="[0-9]{4,8}"
              placeholder="Herhaal pincode"
              maxlength="8"
            />
          </div>
          <button id="family-submit" type="submit" class="button button--primary">Inloggen</button>
        </form>
      </section>

      <section id="list-panel" class="panel" hidden>
        <form
          id="add-item-form"
          class="add-item-form"
          autocomplete="off"
          method="post"
          action="javascript:void(0)"
          onsubmit="return false"
        >
          <div class="field">
            <label for="item-name">Wat moet er gehaald worden?</label>
            <input
              id="item-name"
              name="name"
              type="text"
              placeholder="Bijv. melk, brood, appels"
              required
              maxlength="80"
            />
          </div>

          <div class="field field--split">
            <div>
              <label for="item-quantity">Aantal</label>
              <input
                id="item-quantity"
                name="quantity"
                type="text"
                placeholder="Bijv. 2 of 1 pak"
                maxlength="30"
              />
            </div>
            <div>
              <label for="item-added-by">Toegevoegd door</label>
              <input
                id="item-added-by"
                name="addedBy"
                type="text"
                placeholder="Naam gezinslid"
                maxlength="40"
              />
            </div>
          </div>

          <button type="submit" class="button button--primary">Toevoegen</button>
        </form>
      </section>

      <section id="items-panel" class="panel" hidden>
        <div class="toolbar">
          <h2 id="list-title">Boodschappenlijst</h2>
          <div class="toolbar__actions">
            <button id="switch-family" class="button button--ghost" type="button">
              Wissel gezin
            </button>
            <button id="clear-checked" class="button button--secondary" type="button">
              Verwijder afgevinkt
            </button>
            <button id="clear-all" class="button button--danger" type="button">
              Leeg lijstje
            </button>
          </div>
        </div>

        <ul id="shopping-list" class="shopping-list" aria-live="polite"></ul>
        <p id="empty-state" class="empty-state">
          De lijst is leeg. Voeg het eerste product toe.
        </p>
      </section>
    </main>

    <template id="item-template">
      <li class="shopping-item">
        <label class="shopping-item__main">
          <input type="checkbox" class="shopping-item__checkbox" />
          <span class="shopping-item__name"></span>
        </label>
        <div class="shopping-item__meta"></div>
        <button type="button" class="shopping-item__delete" aria-label="Verwijder product">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M9 3a1 1 0 0 0-1 1v1H5.5a1 1 0 1 0 0 2H6l.74 11.16A2 2 0 0 0 8.73 20h6.54a2 2 0 0 0 1.99-1.84L18 7h.5a1 1 0 1 0 0-2H16V4a1 1 0 0 0-1-1H9Zm1 2V5h4V5h-4Zm-1.26 3h6.52l-.66 9.86a.5.5 0 0 1-.5.46H9.9a.5.5 0 0 1-.5-.46L8.74 8Zm2.26 2a.75.75 0 0 0-.75.75v4.5a.75.75 0 0 0 1.5 0v-4.5A.75.75 0 0 0 11 10Zm3.75.75a.75.75 0 0 0-1.5 0v4.5a.75.75 0 0 0 1.5 0v-4.5Z"
            />
          </svg>
        </button>
      </li>
    </template>

    <script src="./script.js" defer></script>
  </body>
</html>
